<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Pasterry</title>
  <link rel="stylesheet" href="style.css">
  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    /* HOTFIX: Força layout em coluna pro texto */
  .cat-section.product > div:nth-child(2){
      flex:1!important;
      display:flex!important;
      flex-direction:column!important;
      gap:2px!important;
      padding-right:75px!important;
      min-width:0!important;
    }
  .cat-section.product.title{
      display:block!important;
      width:100%!important;
      font-size:13px!important;
      font-weight:700!important;
      line-height:1.3!important;
    }
  .cat-section.product.muted{
      display:block!important;
      width:100%!important;
      font-size:11px!important;
    }
  .cat-section.product.add-btn{
      position:absolute!important;
      right:8px!important;
      top:50%!important;
      transform:translateY(-50%)!important;
    }
  </style>
</head>
<body>
  <div id="toastWrap" aria-live="polite" aria-atomic="true"></div>

  <div class="overlay" id="successOverlay" aria-hidden="true" style="display:none">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="successTitle" style="max-width:640px; flex-direction:column; align-items:center; text-align:center; gap:14px">
      <img id="successImg" src="img/sucesso.png" alt="Pedido finalizado com sucesso" style="width:220px;height:220px;object-fit:contain;border-radius:16px;background:#021522;box-shadow:0 10px 30px rgba(0,0,0,.5)">
      <div id="successTitle" style="font-weight:900;font-size:24px;color:var(--accent)">Pedido confirmado!</div>
      <div class="muted" id="successMsg" style="font-size:15px">Seu pedido foi enviado para a cozinha e está sendo impresso.</div>
      <button class="btn" id="okSuccess" type="button" style="width:220px">OK</button>
    </div>
  </div>

  <div id="printArea" aria-hidden="true"></div>

  <div class="app" id="app">
    <header>
      
      <div class="brand" role="banner">
        <div class="logo" aria-hidden="true"><img src="img/logo.jpg" alt="Logo Pasterry"></div>
        <div class="brand-text"><div class="brand-sub"></div></div>
      </div>
      <div class="actions"></div>
    </header>

    <main>
      <div class="categories" id="categories" role="tablist" aria-label="Categorias"></div>

      <div class="destaques" id="destaques">
        <h2>Destaques</h2>
        <div class="destaques-grid" id="destaquesGrid"></div>
      </div>

      <div class="content">
        <div class="left" aria-live="polite">
          <div class="products-wrap">
            <div id="products" class="products" role="list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de quantidade -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="left-panel">
        <div id="dialogTitle" style="font-weight:800;font-size:18px">Editar quantidade</div>
        <div class="num-display" id="numDisplay">1</div>
        <div class="kbd" id="kbd">
          <button data-key="1" type="button">1</button><button data-key="2" type="button">2</button><button data-key="3" type="button">3</button>
          <button data-key="4" type="button">4</button><button data-key="5" type="button">5</button><button data-key="6" type="button">6</button>
          <button data-key="7" type="button">7</button><button data-key="8" type="button">8</button><button data-key="9" type="button">9</button>
          <button data-key="back" type="button">⌫</button><button data-key="0" type="button">0</button><button data-key="clear" type="button">C</button>
        </div>
      </div>
      <div style="width:260px;display:flex;flex-direction:column;gap:10px;align-items:stretch">
        <button class="btn" id="saveQty" type="button">Salvar</button>
        <button class="btn secondary" id="cancelQty" type="button">Cancelar</button>
        <div style="color:var(--muted);font-size:13px">Para quantidades grandes, use os botões 0-9</div>
      </div>
    </div>
  </div>

  <!-- Modal de tamanhos -->
  <div class="overlay" id="sizeOverlay" aria-hidden="true" style="display:none">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="sizeTitle" style="max-width:720px">
      <div class="left-panel">
        <div id="sizeTitle" style="font-weight:800;font-size:18px"></div>
        <div id="sizeDesc" class="muted" style="margin-top:4px"></div>
        <div id="sizeOptions" style="display:grid;gap:10px;margin-top:14px"></div>
      </div>
      <div class="size-image-wrap">
        <img id="sizeImg" class="size-image" alt="" />
        <div class="muted" style="text-align:center">Toque em uma opção para adicionar ao pedido.</div>
      </div>
    </div>
  </div>

  <div class="attract hidden" id="attract" role="dialog" aria-modal="true">
    <h1>Bem-vindo</h1>
    <p>Peça rápido e fácil no nosso</p>
    <button class="big-btn" id="startBtn" type="button" aria-label="Iniciar atendimento">Toque para Iniciar</button>
  </div>

  <div class="footer-bar">
    <button class="btn cart-btn footer-cart" id="checkoutBtn" type="button" aria-label="Ver carrinho">
      <span class="cart-ico" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M7 4h-2l-1 2h2l3.6 7.59-1.35 2.44C8.52 16.37 8.92 17 9.5 17h9v-2h-8.6l1.1-2h6.45c.75 0 1.41-.41 1.75-1.03L22 7H6.42l-.7-1.5C5.52 5.2 5.27 5 5H3V3h2c.83 0 1.55.52 1.83 1.3L7 4zm5 13c-1.1 0-2-.9-2-2s.9-2 2-2 2.9 2 2-.9 2-2 2zm-6 0c-1.1 0-2-.9-2-2s.9-2 2.9 2 2-.9 2-2 2z"/>
        </svg>
      </span>
      <span class="cart-label">Ver carrinho</span>
      <span class="cart-total" id="cartTotal">R$ 0,00</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>

  <script>
  // --- FIREBASE CONFIGURADO ---
  const firebaseConfig = {
    apiKey: "AIzaSyDV9tPC5XNNmB_REgW1au2NtpP1ETtV1i0",
    authDomain: "paineldepedidos-8cfff.firebaseapp.com",
    projectId: "paineldepedidos-8cfff",
    storageBucket: "paineldepedidos-8cfff.firebasestorage.app",
    messagingSenderId: "390619980929",
    appId: "1:390619980929:web:5bb015938e9dcb89389980",
    measurementId: "G-CMH7LSQ7C0"
  };

  try {
    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    console.log('Firebase OK');
  } catch(e) {
    console.error('Firebase erro:', e);
    var db = null;
  }

  // Fallback caso Firebase falhe
  const DEFAULT_CATEGORIES = [
    { id: 'pasteis', name: 'Pastéis' },
    { id: 'bebidas', name: 'Bebidas' }
  ];
  const DEFAULT_PRODUCTS = {
    "pasteis": [{"id":"beef1","title":"BEEF 1 — Só carne moída","desc":"Pastel de carne moída.","img":"img/beef1.png","sizes":{"15":13,"25":15}}],
    "bebidas": [{"id":"coca350","title":"Coca-Cola","desc":"Lata 350ml","img":"img/coca.png","price":6}]
  };

  let CATEGORIES = [];
  let PRODUCTS = {};

  const CART_KEY = 'pasterry_cart_v1';
  function loadCart(){ try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch { return []; } }
  function saveCart(){ localStorage.setItem(CART_KEY, JSON.stringify(cart)); updateCheckoutText(); }
  let cart = loadCart();

  let activeCategory = null;

  const categoriesEl = document.getElementById('categories');
  const productsEl = document.getElementById('products');
  const overlay = document.getElementById('overlay');
  const numDisplay = document.getElementById('numDisplay');
  const attract = document.getElementById('attract');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const toastWrap = document.getElementById('toastWrap');
  const cartBadge = document.getElementById('cartBadge');
  const productsWrap = document.querySelector('.products-wrap');
  const destaquesGrid = document.getElementById('destaquesGrid');
  const MESA = new URLSearchParams(window.location.search).get('mesa');

  const formatBRL = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  function getCartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
  function getCartTotal(){ return cart.reduce((s,i)=> s + (i.price * i.qty), 0); }
  function updateCheckoutText(){
    const n = getCartCount();
    const total = getCartTotal();
    if (cartBadge) cartBadge.textContent = n;
    const totalEl = document.getElementById('cartTotal');
    if (totalEl) totalEl.textContent = formatBRL(total);
    if (checkoutBtn) checkoutBtn.setAttribute('aria-label', `Ver carrinho (${n} itens, ${formatBRL(total)})`);
  }
  function pulseCart(){
    const btn = document.getElementById('checkoutBtn');
    const badge = document.getElementById('cartBadge');
    [btn, badge].forEach(el => { if(!el) return; el.classList.remove('press'); void el.offsetWidth; el.classList.add('press'); });
  }

  function setActiveCategory(catId, {scrollIntoView=false}={}){
    if (!catId || (activeCategory === catId &&!scrollIntoView)) return;
    activeCategory = catId;
    document.querySelectorAll('.cat').forEach(b=>{
      const isActive = b.dataset.cat === catId;
      b.classList.toggle('active', isActive);
      if (isActive && scrollIntoView) b.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
    });
  }

  function renderDestaques(){
    if(!destaquesGrid) return;
    const allProducts = [];
    CATEGORIES.forEach(cat => {
      (PRODUCTS[cat.id] || []).forEach(p => allProducts.push({...p, cat: cat.id}));
    });
    const destaques = allProducts.slice(0, 6);

    destaquesGrid.innerHTML = destaques.map((p,i)=>{
      const price = p.sizes? Math.min(...Object.values(p.sizes)) : p.price;
      return `
        <div class="destaque-card" onclick="window._addDestaque('${p.id}','${p.cat}')">
          <div class="img-wrap">
            <img src="${p.img}" alt="${p.title}" loading="lazy">
            ${i===0?'<div class="badge">Mais pedido</div>':''}
          </div>
          <div class="info">
            <div class="price">${formatBRL(price)}</div>
            <div class="title">${p.title.split(' — ')[0]}</div>
            <div class="destaque-btns">
              <button class="destaque-add" onclick="event.stopPropagation(); window._addDestaque('${p.id}','${p.cat}')">Adicionar</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window._addDestaque = (id, cat)=>{
    const p = (PRODUCTS[cat]||[]).find(x=>x.id===id);
    if(!p) return;
    if(p.sizes) openSizeDialog(p, cat);
    else addToCart(id, cat);
  };

  function renderCategories(){
    if(!categoriesEl) return;
    categoriesEl.innerHTML = '';
    CATEGORIES.forEach(cat=>{
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'cat' + (cat.id === activeCategory? ' active' : '');
      b.dataset.cat = cat.id;
      b.textContent = cat.name;
      b.setAttribute('role','tab');
      b.addEventListener('click', ()=>{
        const section = document.querySelector(`.cat-section[data-cat="${cat.id}"]`);
        if (section) section.scrollIntoView({behavior:'smooth', block:'start'});
        setActiveCategory(cat.id, {scrollIntoView:true});
      });
      categoriesEl.appendChild(b);
    });
    document.querySelectorAll('.cat').forEach(bindPressAnimation);
  }

  function renderProducts(){
    if(!productsEl) return;
    productsEl.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const section = document.createElement('section');
      section.className = 'cat-section';
      section.dataset.cat = cat.id;
      section.style.scrollMarginTop = '120px';

      const header = document.createElement('div');
      header.className = 'muted';
      header.textContent = cat.name;
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'products';

      const list = PRODUCTS[cat.id] || [];
      list.forEach(p=>{
        const card = document.createElement('div');
        card.className = 'product';
        card.tabIndex = 0;
        card.setAttribute('role','listitem');

        const media = document.createElement('div');
        media.className = 'media';
        const img = document.createElement('img');
        img.alt = p.title;
        img.src = p.img || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='400'><rect width='100%' height='100%' fill='%230a1420'/><text x='50%' y='50%' fill='%23a7b6c1' font-size='20' text-anchor='middle' dominant-baseline='middle'>Imagem</text></svg>";
        img.loading = 'lazy';
        media.appendChild(img);

        // WRAPPER CORRETO - FORÇA COLUNA
        const textWrap = document.createElement('div');

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = p.title;

        const desc = document.createElement('div');
        desc.className = 'muted';
        desc.textContent = p.desc || '';

        const price = document.createElement('div');
        price.className = 'price';
        if (p.sizes) {
          const minPrice = Math.min(...Object.values(p.sizes));
          price.textContent = `A partir de ${formatBRL(minPrice)}`;
        } else if (p.price) {
          price.textContent = formatBRL(p.price);
        }

        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'add-btn';
        addBtn.setAttribute('aria-label', `Adicionar ${p.title}`);
        addBtn.textContent = 'Adicionar';
        addBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          console.log('CLICOU:', p.title, 'Sizes:', p.sizes, 'Cat:', cat.id);
          if (p.sizes) {
            openSizeDialog(p, cat.id);
          } else if (p.price) {
            addToCart(p.id, cat.id);
          } else {
            showToast({ title: 'Erro', sub: 'Produto sem preço' });
          }
        });

        textWrap.appendChild(title);
        textWrap.appendChild(desc);
        textWrap.appendChild(price);

        card.appendChild(media);
        card.appendChild(textWrap);
        card.appendChild(addBtn);
        grid.appendChild(card);
      });

      section.appendChild(grid);
      productsEl.appendChild(section);
    });
    document.querySelectorAll('.add-btn').forEach(bindPressAnimation);
  }

  function showToast({title='Item adicionado', sub=''}={}){
    if(!toastWrap) return;
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<div class="check">✓</div><div><div class="title">${title}</div>${sub? `<div class="sub">${sub}</div>` : ``}</div>`;
    toastWrap.appendChild(el);
    setTimeout(()=>{ el.remove(); }, 1900);
  }

  function addToCart(productId, category){
    const p = (PRODUCTS[category]||[]).find(x=>x.id===productId);
    if(!p) return;
    if(p.sizes) {
      openSizeDialog(p, category);
      return;
    }
    if(!p.price) {
      showToast({ title: 'Erro', sub: 'Produto sem preço' });
      return;
    }
    const existing = cart.find(i=>i.id===productId);
    if(existing) existing.qty += 1;
    else cart.push({ id: p.id, title: p.title, price: p.price, qty: 1, img: p.img });
    saveCart(); pulseCart();
    const q = (existing? existing.qty : 1);
    showToast({ title: `${p.title} adicionado`, sub: `Quantidade no carrinho: ${q}` });
  }

  function addToCartWithSize(p, sizeKey, categoryId){
    const price = p.sizes[sizeKey];
    const isAcai = (categoryId === 'acai' || (p.id||'').startsWith('acai'));
    const unit = isAcai? 'ml' : 'cm';
    const variantId = `${p.id}-${sizeKey}`;
    const titleWithSize = `${p.title} ${sizeKey}${unit}`;
    const existing = cart.find(i=>i.id===variantId);
    if(existing) existing.qty += 1;
    else cart.push({ id: variantId, title: titleWithSize, price, qty: 1, img: p.img });
    saveCart(); pulseCart();
    const q = (existing? existing.qty : 1);
    showToast({ title: `${titleWithSize} adicionado`, sub: `Quantidade no carrinho: ${q}` });
  }

  let editingIndex = null;
  function openQtyDialog(idx){
    if(!overlay ||!numDisplay) return;
    editingIndex = idx;
    numDisplay.textContent = String(cart[idx].qty);
    overlay.style.display = 'flex';
    overlay.setAttribute('aria-hidden','false');
    const kbd = document.getElementById('kbd');
    if(kbd) kbd.querySelectorAll('button').forEach(b=>{ b.onclick = ()=> handleKey(b.dataset.key); });
    document.querySelectorAll('#kbd button, #saveQty, #cancelQty').forEach(bindPressAnimation);
  }
  function closeQtyDialog(){
    if(!overlay) return;
    overlay.style.display = 'none';
    overlay.setAttribute('aria-hidden','true');
    editingIndex = null;
  }
  function handleKey(key){
    if(!numDisplay) return;
    let v = numDisplay.textContent;
    if(key === 'back'){ v = v.slice(0,-1) || '0'; }
    else if(key === 'clear'){ v = '0'; }
    else { v = (v === '0')? key : v + key; }
    if(v.length > 4) v = v.slice(0,4);
    v = v.replace(/^0+(?=\d)/,'');
    if(v === '' ) v = '0';
    numDisplay.textContent = v;
  }
  document.getElementById('saveQty').addEventListener('click', ()=>{
    const n = parseInt(numDisplay.textContent || '0',10);
    if(!isNaN(n) && n>=1 && editingIndex!== null){ cart[editingIndex].qty = n; saveCart(); }
    closeQtyDialog();
  });
  document.getElementById('cancelQty').addEventListener('click', ()=> closeQtyDialog());
  overlay.addEventListener('click', (e)=> { if(e.target === overlay) closeQtyDialog(); });

  const sizeOverlay = document.getElementById('sizeOverlay');
  const sizeTitle = document.getElementById('sizeTitle');
  const sizeDesc = document.getElementById('sizeDesc');
  const sizeOptions = document.getElementById('sizeOptions');
  const sizeImg = document.getElementById('sizeImg');

  function openSizeDialog(p, catId){
    if(!sizeOverlay) return;
    setActiveCategory(catId);
    if(sizeTitle) sizeTitle.textContent = p.title;
    if(sizeDesc) sizeDesc.textContent = p.desc || '';
    if(sizeImg) {
      sizeImg.src = p.img || '';
      sizeImg.alt = p.title;
    }
    if(sizeOptions) {
      sizeOptions.innerHTML = '';
      const entries = Object.entries(p.sizes || {}).sort((a,b)=> Number(a[0]) - Number(b[0]));
      const isAcai = (catId === 'acai' || (p.id||'').startsWith('acai'));
      entries.forEach(([size, price])=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn';
        btn.style.display = 'flex';
        btn.style.justifyContent = 'space-between';
        btn.style.alignItems = 'center';
        const label = isAcai? `${size} ml` : `${size} cm`;
        btn.innerHTML = `<span>${label}</span><strong>${formatBRL(price)}</strong>`;
        btn.addEventListener('click', ()=>{
          addToCartWithSize(p, size, catId);
          closeSizeDialog();
        });
        bindPressAnimation(btn);
        sizeOptions.appendChild(btn);
      });
    }
    sizeOverlay.style.display = 'flex';
    sizeOverlay.setAttribute('aria-hidden','false');
  }
  function closeSizeDialog(){
    if(!sizeOverlay) return;
    sizeOverlay.style.display = 'none';
    sizeOverlay.setAttribute('aria-hidden','true');
  }
  sizeOverlay.addEventListener('click', (e)=>{ if(e.target === sizeOverlay) closeSizeDialog(); });

  checkoutBtn.addEventListener('click', ()=>{
    saveCart();
    const url = MESA? `carrinho.html?mesa=${MESA}` : 'carrinho.html';
    window.location.href = url;
  });

  function bindPressAnimation(el){
    if(!el) return;
    const add = ()=>{ el.classList.remove('press'); void el.offsetWidth; el.classList.add('press'); };
    el.addEventListener('mousedown', add);
    el.addEventListener('touchstart', add, {passive:true});
  }
  document.querySelectorAll('button,.btn,.big-btn,.cat').forEach(bindPressAnimation);

  // --- INICIALIZAÇÃO COM FIREBASE ---
  function iniciarFirebase(){
    const cached = localStorage.getItem('pasterry_data_v1');
    if(cached){
      try{
        const data = JSON.parse(cached);
        CATEGORIES = data.categories || DEFAULT_CATEGORIES;
        PRODUCTS = data.products || DEFAULT_PRODUCTS;
      }catch(e){
        CATEGORIES = DEFAULT_CATEGORIES;
        PRODUCTS = DEFAULT_PRODUCTS;
      }
    } else {
      CATEGORIES = DEFAULT_CATEGORIES;
      PRODUCTS = DEFAULT_PRODUCTS;
    }

    if(CATEGORIES.length &&!activeCategory) activeCategory = CATEGORIES[0].id;
    renderCategories();
    renderProducts();
    renderDestaques();
    updateCheckoutText();

    if(db) {
      db.collection('pasterry').doc('menu').onSnapshot((doc)=>{
        if(doc.exists){
          const data = doc.data();
          if(data.categories && data.products){
            CATEGORIES = data.categories;
            PRODUCTS = data.products;
            localStorage.setItem('pasterry_data_v1', JSON.stringify(data));
            if(!activeCategory && CATEGORIES.length) activeCategory = CATEGORIES[0].id;
            renderCategories();
            renderProducts();
            renderDestaques();
            updateCheckoutText();
            showToast({ title: 'Cardápio atualizado', sub: 'Novos itens disponíveis' });
          }
        }
      }, (error) => {
        console.log('Firebase offline, usando cache:', error);
      });
    }
  }

  // Aguarda DOM carregar
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', iniciarFirebase);
  } else {
    iniciarFirebase();
  }

  // Scroll spy pra destacar categoria atual
  (function initScrollSpy(){
    const wrap = document.scrollingElement;
    if (!wrap) return;
    let isClickScrolling = false;
    let clickTimeout = null;
    document.getElementById('categories')?.addEventListener('click', (e)=>{
      if (e.target.closest('.cat')) {
        isClickScrolling = true;
        clearTimeout(clickTimeout);
        clickTimeout = setTimeout(()=>{ isClickScrolling = false; }, 600);
      }
    });

    const io = new IntersectionObserver((entries)=>{
      if (isClickScrolling) return;
      const visible = entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio - a.intersectionRatio)[0];
      const catId = visible?.target?.dataset?.cat;
      if (catId) setActiveCategory(catId);
    }, { threshold: [0.25, 0.5, 0.75], rootMargin: '-120px 0px -45% 0px' });

    const observeAll = ()=> document.querySelectorAll('.cat-section').forEach(sec=>io.observe(sec));
    observeAll();
    const _renderProducts = renderProducts;
    renderProducts = function(){ _renderProducts(); observeAll(); };
  })();

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') {
      if(overlay && overlay.style.display === 'flex') closeQtyDialog();
      if(sizeOverlay && sizeOverlay.style.display === 'flex') closeSizeDialog();
    }
  });

  const successOverlay = document.getElementById('successOverlay');
  const okSuccessBtn = document.getElementById('okSuccess');
  let successTimer = null;
  function showSuccess({title='Pedido confirmado!', msg='Seu pedido foi enviado para a cozinha e está sendo impresso.', img='img/sucesso.png', autoCloseMs=2500} = {}){
    if(!successOverlay) return;
    document.getElementById('successTitle').textContent = title;
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('successImg').src = img;
    successOverlay.style.display = 'flex';
    successOverlay.setAttribute('aria-hidden','false');
    clearTimeout(successTimer);
    successTimer = setTimeout(hideSuccess, autoCloseMs);
  }
  function hideSuccess(){
    if(!successOverlay) return;
    successOverlay.style.display = 'none';
    successOverlay.setAttribute('aria-hidden','true');
    clearTimeout(successTimer);
  }
  if(successOverlay) successOverlay.addEventListener('click', (e)=>{ if(e.target === successOverlay) hideSuccess(); });
  if(okSuccessBtn) okSuccessBtn.addEventListener('click', hideSuccess);

  const CLIENTE_KEY = 'pasterry_cliente_v1';
  function atualizarBotaoPedidos(){
    const btn = document.getElementById('btnPedidos');
    if(!btn) return;
    try {
      const cli = JSON.parse(localStorage.getItem(CLIENTE_KEY) || '{}');
      const pedidos = JSON.parse(localStorage.getItem('pedidos_pasterry_v1') || '[]');
      const meus = cli.telefone? pedidos.filter(p => p.cliente.telefone === cli.telefone) : [];
      if (cli.nome && meus.length > 0) {
        btn.innerHTML = `👋 ${cli.nome.split(' ')[0]} • ${meus.length} pedido${meus.length>1?'s':''}`;
        btn.style.background = '#28a745';
        btn.style.color = '#fff';
      } else {
        btn.innerHTML = 'Meus Pedidos';
      }
    }
    catch { btn.innerHTML = 'Meus Pedidos'; }
  }
  document.addEventListener('DOMContentLoaded', atualizarBotaoPedidos);
  window.addEventListener('focus', atualizarBotaoPedidos);
  </script>
</body>
</html>
